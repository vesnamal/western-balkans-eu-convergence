name: 'western_balkans'
version: '1.0.0'
config-version: 2

# In dbt Cloud the active profile comes from the connection, not this line.
profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Single source of truth for the years-to-close reference year. Referenced
  # in wb_fct_years_to_close via {{ var('years_to_close_reference_year') }}
  # instead of a bare literal, so a future re-pull only needs one line changed
  # here rather than a hunt through mart SQL. See that model's header comment
  # for why 2024 was hardcoded rather than computed dynamically.
  years_to_close_reference_year: 2024

models:
  western_balkans:
    +materialized: view
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table